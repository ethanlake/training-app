<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Resolve the theme before first paint, otherwise a dark-mode user gets a
      // white flash on every launch.
      try {
        var stored = localStorage.getItem('training-app/theme')
        var dark =
          stored === 'dark' ||
          (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) {
          document.documentElement.classList.add('dark')
          document.querySelector('meta[name="theme-color"]').content = '#0a0a0a'
        }
      } catch (e) {}
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="/training-app/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/training-app/apple-touch-icon.png" />
    <title>Training</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
